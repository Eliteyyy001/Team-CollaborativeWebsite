<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f6fa;
    }

    header {
      background: #2f3640;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters input, .filters button {
      padding: 8px;
      margin-right: 10px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
      color: #888;
    }

    .card p {
      font-size: 22px;
      margin: 10px 0 0;
      font-weight: bold;
    }

    canvas {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <h1>Dashboard</h1>
</header>

<div class="container">

  <!-- Filters -->
  <div class="filters">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button id="filterBtn">Apply Filter</button>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="card">
      <h3>Total Revenue</h3>
      <p>$<span id="revenue">0</span></p>
    </div>

    <div class="card">
      <h3>Total Orders</h3>
      <p><span id="orders">0</span></p>
    </div>

    <div class="card">
      <h3>Total Products</h3>
      <p><span id="products">0</span></p>
    </div>

    <div class="card">
      <h3>Low Stock</h3>
      <p><span id="lowStock">0</span></p>
    </div>

    <div class="card">
      <h3>Out of Stock</h3>
      <p><span id="outOfStock">0</span></p>
    </div>
  </div>

  <!-- Chart -->
  <canvas id="salesChart"></canvas>

</div>

<script>
  document.getElementById("filterBtn").addEventListener("click", loadDashboard);
</script>

<script src="dashboard.js"></script>

</body>
</html>
