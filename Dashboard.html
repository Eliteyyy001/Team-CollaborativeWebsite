<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <h1>Dashboard</h1>

  <!-- Filters -->
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="loadDashboard()">Apply Filter</button>

  <!-- Metrics -->
  <div>
    <p>Total Revenue: $<span id="revenue">0</span></p>
    <p>Total Orders: <span id="orders">0</span></p>
    <p>Total Products: <span id="products">0</span></p>
    <p>Low Stock: <span id="lowStock">0</span></p>
    <p>Out of Stock: <span id="outOfStock">0</span></p>
  </div>

  <!-- Chart -->
  <canvas id="salesChart"></canvas>

  <script src="dashboard.js"></script>
</body>
</html>
