<!DOCTYPE html>
<html>
<head>
  <title>Sales History</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Sales History</h1>

    <div class="report-summary">
      <div>Total Sales: $<span id="totalSales">0</span></div>
      <div>Total Orders: <span id="totalOrders">0</span></div>
    </div>

    <table id="salesTable">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Date</th>
          <th>Customer</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="sales.js"></script>
</body>
</html>
